<section class="gallery-grid">
      @for (photo of photos(); track photo.id; let i = $index) {
        <div class="photo-card" (click)="openLightbox(i)">
          <img [src]="photo.url" [alt]="photo.title" loading="lazy">
          <div class="protection-layer"></div>
          <div class="info">
            <h3>{{ photo.title }}</h3>
          </div>
        </div>
      }
    </section>

    @if (selectedIdx() !== null) {
      <div class="lightbox" (click)="closeLightbox()">
        <button class="close-btn">&times;</button>
        
        <button class="nav-btn prev" (click)="prev($event)">&#10094;</button>
        
        <div class="lightbox-content" (click)="$event.stopPropagation()">
          <img [src]="photos()[selectedIdx()!].url" [alt]="photos()[selectedIdx()!].title">
          <p class="caption">{{ photos()[selectedIdx()!].title }}</p>
        </div>

        <button class="nav-btn next" (click)="next($event)">&#10095;</button>
      </div>
    }
